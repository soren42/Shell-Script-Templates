# Notification Plugin for Shell Script Templates v4
# Provides multi-channel notification delivery: ntfy, email, webhooks

PLUGIN_NAME="notification"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Send notifications via ntfy, email, and webhooks"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="curl"

# ntfy configuration (https://ntfy.sh)
NOTIFY_NTFY_SERVER="${NOTIFY_NTFY_SERVER:-https://ntfy.sh}"
NOTIFY_NTFY_TOPIC="${NOTIFY_NTFY_TOPIC:-}"
NOTIFY_NTFY_TOKEN="${NOTIFY_NTFY_TOKEN:-}"
NOTIFY_NTFY_PRIORITY="${NOTIFY_NTFY_PRIORITY:-default}"

# Email configuration (requires sendmail, msmtp, or curl + SMTP relay)
NOTIFY_EMAIL_TO="${NOTIFY_EMAIL_TO:-}"
NOTIFY_EMAIL_FROM="${NOTIFY_EMAIL_FROM:-noreply@localhost}"
NOTIFY_EMAIL_SUBJECT_PREFIX="${NOTIFY_EMAIL_SUBJECT_PREFIX:-[SST]}"
NOTIFY_EMAIL_METHOD="${NOTIFY_EMAIL_METHOD:-sendmail}"  # sendmail, msmtp, curl

# Webhook configuration
NOTIFY_WEBHOOK_URL="${NOTIFY_WEBHOOK_URL:-}"
NOTIFY_WEBHOOK_FORMAT="${NOTIFY_WEBHOOK_FORMAT:-slack}"  # slack, discord, generic

# General
NOTIFY_TIMEOUT=${NOTIFY_TIMEOUT:-15}
