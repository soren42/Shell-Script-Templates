# Completions Plugin for Shell Script Templates v4
# Generates and installs shell completion scripts for bash and zsh

PLUGIN_NAME="completions"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Generate and install bash/zsh tab-completion scripts"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="none"

# Installation directories (auto-detected in init.sh, overridable)
COMP_BASH_DIR=""       # Set in init.sh
COMP_ZSH_DIR=""        # Set in init.sh

# Whether to install system-wide (requires root) or per-user
COMP_INSTALL_SCOPE="${COMP_INSTALL_SCOPE:-user}"
