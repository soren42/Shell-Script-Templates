# HTTP Client Plugin for Shell Script Templates v4
# Provides a robust HTTP client wrapper with retries, auth, and error handling

PLUGIN_NAME="http-client"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="HTTP client with retries, auth, and response handling"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="curl"

# Default configuration
HTTP_MAX_RETRIES=${HTTP_MAX_RETRIES:-3}
HTTP_RETRY_DELAY=${HTTP_RETRY_DELAY:-2}
HTTP_TIMEOUT=${HTTP_TIMEOUT:-30}
HTTP_CONNECT_TIMEOUT=${HTTP_CONNECT_TIMEOUT:-10}
HTTP_USER_AGENT=${HTTP_USER_AGENT:-"ShellScriptTemplates/4.0"}
HTTP_FOLLOW_REDIRECTS=${HTTP_FOLLOW_REDIRECTS:-true}
HTTP_MAX_REDIRECTS=${HTTP_MAX_REDIRECTS:-5}
