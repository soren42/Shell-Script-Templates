# Cloud Storage Plugin for Shell Script Templates v4
# Provides unified file operations across AWS S3, Google Cloud Storage,
# and S3-compatible backends (MinIO, Backblaze B2, Wasabi, etc.)

PLUGIN_NAME="cloud-storage"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Cloud storage operations for S3, GCS, and S3-compatible services"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="none"

# Active provider: s3, gcs, s3compat
CLOUD_PROVIDER="${CLOUD_PROVIDER:-s3}"

# AWS S3 configuration (also used for S3-compatible)
CLOUD_S3_BUCKET="${CLOUD_S3_BUCKET:-}"
CLOUD_S3_REGION="${CLOUD_S3_REGION:-us-east-1}"
CLOUD_S3_ENDPOINT="${CLOUD_S3_ENDPOINT:-}"  # Custom endpoint for S3-compatible

# Google Cloud Storage
CLOUD_GCS_BUCKET="${CLOUD_GCS_BUCKET:-}"
CLOUD_GCS_PROJECT="${CLOUD_GCS_PROJECT:-}"

# General
CLOUD_DEFAULT_ACL="${CLOUD_DEFAULT_ACL:-private}"
CLOUD_TIMEOUT=${CLOUD_TIMEOUT:-300}
