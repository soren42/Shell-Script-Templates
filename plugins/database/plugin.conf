# Database Plugin for Shell Script Templates v4
# Provides unified helpers for SQLite, PostgreSQL, and MySQL/MariaDB

PLUGIN_NAME="database"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Database helpers for SQLite, PostgreSQL, and MySQL/MariaDB"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="none"

# Default provider: sqlite, postgres, mysql
DB_PROVIDER="${DB_PROVIDER:-sqlite}"

# SQLite defaults
DB_SQLITE_FILE="${DB_SQLITE_FILE:-data.db}"

# PostgreSQL defaults
DB_PG_HOST="${DB_PG_HOST:-localhost}"
DB_PG_PORT="${DB_PG_PORT:-5432}"
DB_PG_USER="${DB_PG_USER:-${USER}}"
DB_PG_DATABASE="${DB_PG_DATABASE:-}"
DB_PG_PASSWORD="${PGPASSWORD:-}"

# MySQL/MariaDB defaults
DB_MY_HOST="${DB_MY_HOST:-localhost}"
DB_MY_PORT="${DB_MY_PORT:-3306}"
DB_MY_USER="${DB_MY_USER:-${USER}}"
DB_MY_DATABASE="${DB_MY_DATABASE:-}"
DB_MY_PASSWORD="${DB_MY_PASSWORD:-}"

# Query defaults
DB_TIMEOUT=${DB_TIMEOUT:-30}
DB_HEADER=${DB_HEADER:-true}
DB_SEPARATOR="${DB_SEPARATOR:-|}"
