# TUI Plugin for Shell Script Templates v4
# Provides a unified Text User Interface abstraction layer

PLUGIN_NAME="tui"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Text User Interface with gum/dialog/whiptail backends"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="none"

# Backend preference order (first available is used)
# gum:       Modern, beautiful prompts (https://github.com/charmbracelet/gum)
# dialog:    Classic ncurses dialogs (widely available on Linux)
# whiptail:  Lightweight ncurses alternative (Debian/Ubuntu default)
# fallback:  Pure bash/zsh using ANSI escape codes (always available)
TUI_BACKEND_PREFERENCE="gum dialog whiptail fallback"

# Default dimensions for dialog/whiptail windows
TUI_DEFAULT_HEIGHT=20
TUI_DEFAULT_WIDTH=70
TUI_DEFAULT_LIST_HEIGHT=12

# Gum styling defaults
TUI_GUM_PROMPT_COLOR="#00CCFF"
TUI_GUM_SELECTED_COLOR="#00FF88"
TUI_GUM_HEADER_COLOR="#FFCC00"
