# Parallel Plugin for Shell Script Templates v4
# Provides concurrent execution helpers using GNU parallel, xargs, or built-in jobs

PLUGIN_NAME="parallel"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Concurrent execution via GNU parallel, xargs, or job control"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="none"

# Backend preference: parallel, xargs, jobs
PARALLEL_BACKEND="${PARALLEL_BACKEND:-auto}"

# Default concurrency (0 = number of CPU cores)
PARALLEL_JOBS=${PARALLEL_JOBS:-0}

# Progress reporting
PARALLEL_PROGRESS=${PARALLEL_PROGRESS:-true}

# Failure handling: fail_fast (stop on first error) or collect (run all, report)
PARALLEL_ON_ERROR="${PARALLEL_ON_ERROR:-collect}"
