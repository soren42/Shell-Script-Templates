# AI Integration Plugin for Shell Script Templates v4
# Provides a unified interface for calling LLM APIs from shell scripts

PLUGIN_NAME="ai-integration"
PLUGIN_VERSION="4.0.0"
PLUGIN_DESCRIPTION="LLM API integration (Claude, GPT, Gemini)"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="curl jq"

# Provider configuration
# Supported: anthropic, openai, google
AI_PROVIDER="${AI_PROVIDER:-anthropic}"

# Model defaults per provider
AI_MODEL_ANTHROPIC="${AI_MODEL_ANTHROPIC:-claude-sonnet-4-20250514}"
AI_MODEL_OPENAI="${AI_MODEL_OPENAI:-gpt-4o}"
AI_MODEL_GOOGLE="${AI_MODEL_GOOGLE:-gemini-2.0-flash}"

# API keys (read from environment)
# ANTHROPIC_API_KEY
# OPENAI_API_KEY
# GOOGLE_API_KEY

# Request defaults
AI_MAX_TOKENS=${AI_MAX_TOKENS:-4096}
AI_TEMPERATURE=${AI_TEMPERATURE:-1.0}
AI_TIMEOUT=${AI_TIMEOUT:-120}

# API endpoints
AI_ENDPOINT_ANTHROPIC="https://api.anthropic.com/v1/messages"
AI_ENDPOINT_OPENAI="https://api.openai.com/v1/chat/completions"
AI_ENDPOINT_GOOGLE="https://generativelanguage.googleapis.com/v1beta/models"
