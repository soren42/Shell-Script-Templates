# Logging Extended Plugin for Shell Script Templates v4
# Adds syslog, journald, and file-based log rotation to the built-in logging

PLUGIN_NAME="logging-extended"
PLUGIN_VERSION="4.1.0"
PLUGIN_DESCRIPTION="Syslog, journald integration, and log file rotation"
PLUGIN_AUTHOR="jason c. kay"
PLUGIN_LICENSE="CC BY-SA 4.0"
PLUGIN_DEPENDENCIES="none"

# Syslog configuration
LOG_SYSLOG_ENABLED=${LOG_SYSLOG_ENABLED:-false}
LOG_SYSLOG_FACILITY="${LOG_SYSLOG_FACILITY:-user}"
LOG_SYSLOG_TAG="${LOG_SYSLOG_TAG:-}"   # Defaults to SCRIPT_NAME if empty

# Journald configuration
LOG_JOURNALD_ENABLED=${LOG_JOURNALD_ENABLED:-false}

# File logging configuration
LOG_FILE_ENABLED=${LOG_FILE_ENABLED:-false}
LOG_FILE_PATH="${LOG_FILE_PATH:-}"      # Defaults to /var/log/SCRIPT_NAME.log or ~/.local/log/
LOG_FILE_MAX_SIZE_KB=${LOG_FILE_MAX_SIZE_KB:-10240}  # 10MB
LOG_FILE_MAX_ROTATIONS=${LOG_FILE_MAX_ROTATIONS:-5}
LOG_FILE_COMPRESS=${LOG_FILE_COMPRESS:-true}
